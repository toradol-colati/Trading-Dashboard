<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>U.G.T. Advanced Command</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
        .topic { margin-bottom: 30px; border-left: 2px solid var(--accent); padding-left: 15px; }
        .topic-title { font-size: 1.5rem; text-transform: uppercase; margin-bottom: 10px; color: var(--accent); }
        .sub-section { margin-left: 20px; margin-bottom: 15px; }
        .sub-title { font-size: 1rem; color: #888; margin-bottom: 8px; border-bottom: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .option-btn { background: #111; border: 1px solid #333; color: white; padding: 12px; text-decoration: none; border-radius: 4px; text-align: center; font-size: 0.85rem; }
        .option-btn:hover { border-color: var(--accent); background: #1a1a1a; }
    </style>
</head>
<body>
    <div id="main-container">Caricamento Hub...</div>

    <script>
        // Questa struttura la modificherai su GitHub per aggiungere Topics e Link
        const data = {
            topics: [
                {
                    name: "Analisi Mercati",
                    subsections: [
                        {
                            name: "Grafici Realtime",
                            options: [
                                { name: "TV Bitcoin", url: "https://it.tradingview.com/chart/..." },
                                { name: "Order Flow", url: "https://bookmap.com" }
                            ]
                        },
                        {
                            name: "Sentiment",
                            options: [
                                { name: "Fear & Greed", url: "https://alternative.me/crypto/fear-and-greed-index/" }
                            ]
                        }
                    ]
                },
                {
                    name: "Gestione Cash",
                    subsections: [
                        {
                            name: "Planning",
                            options: [
                                { name: "File PAC (GitHub)", url: "tuo-file.pdf" }
                            ]
                        }
                    ]
                }
            ]
        };

        function render() {
            const container = document.getElementById('main-container');
            container.innerHTML = '';
            data.topics.forEach(topic => {
                let html = `<div class="topic"><div class="topic-title">${topic.name}</div>`;
                topic.subsections.forEach(sub => {
                    html += `<div class="sub-section"><div class="sub-title">${sub.name}</div><div class="grid">`;
                    sub.options.forEach(opt => {
                        html += `<a href="${opt.url}" target="_blank" class="option-btn">${opt.name}</a>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div>`;
                container.innerHTML += html;
            });
        }
        render();
    </script>
</body>
</html>
