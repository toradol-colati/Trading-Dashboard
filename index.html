<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.G.T. Advanced Command</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --text: #e0e0e0; --card: #111; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        #main-container { padding-bottom: 120px; }
        .topic { margin-bottom: 40px; border-left: 3px solid var(--accent); padding-left: 20px; }
        .topic-title { font-size: 1.6rem; text-transform: uppercase; color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; }
        .sub-section { margin-left: 25px; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .sub-title { font-size: 1.1rem; color: #888; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .option-btn { background: var(--card); border: 1px solid #333; color: white; padding: 15px; text-decoration: none; border-radius: 4px; text-align: center; font-size: 0.9rem; transition: 0.2s; }
        .option-btn:hover { border-color: var(--accent); background: #1a1a1a; }
        .add-btn { background: #1a1a1a; color: var(--accent); border: 1px dashed var(--accent); padding: 5px 10px; cursor: pointer; font-size: 0.7rem; border-radius: 3px; }
        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; justify-content: center; z-index: 100; }
        textarea { width: 100%; height: 150px; background: #000; color: var(--accent); border: 1px solid var(--accent); margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="main-container">Caricamento Hub...</div>

    <div class="controls">
        <button class="add-btn" onclick="addTopic()">+ NUOVO TOPIC</button>
        <button class="add-btn" style="border-color: #ff9800; color: #ff9800;" onclick="exportData()">SALVA CONFIG</button>
    </div>

<script>
    // DATA CORE - Struttura corretta con i tuoi link
    let data = {
      "topics": [
        { "name": "algo-trading", "subsections": [] },
        { "name": "e-cademics", "subsections": [] },
        { "name": "pac savings", "subsections": [] },
        {
          "name": "news",
          "subsections": [
            {
              "name": "crypto",
              "options": [
                { "name": "cryptopanic", "url": "https://cryptopanic.com/" },
                { "name": "CoinTelegraph", "url": "https://it.cointelegraph.com/" },
                { "name": "CoinMarketCap", "url": "https://coinmarketcap.com/" }
              ]
            },
            {
              "name": "General",
              "options": [
                { "name": "Bloomberg", "url": "https://www.bloomberg.com/europe" }
              ]
            }
          ]
        },
        { "name": "chart analysis", "subsections": [] },
        {
          "name": "brokers",
          "subsections": [
            {
              "name": "Active",
              "options": [
                { "name": "Robinhood", "url": "https://robinhood.com/eu/it/" },
                { "name": "YngPlatform", "url": "https://youngplatform.com/" },
                { "name": "IBKR", "url": "https://www.interactivebrokers.com/" }
              ]
            },
            {
              "name": "Non-active",
              "options": [
                { "name": "Coinbase", "url": "https://login.coinbase.com/signin" },
                { "name": "Binance", "url": "https://www.binance.com/it" },
                { "name": "YouHodler", "url": "https://www.youhodler.com/it" },
                { "name": "TradeRepublic", "url": "https://traderepublic.com/it-it" }
              ]
            }
          ]
        }
      ]
    };

    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = '';
        data.topics.forEach((topic, tIdx) => {
            let topicDiv = document.createElement('div');
            topicDiv.className = 'topic';
            topicDiv.innerHTML = `<div class="topic-title"><span>${topic.name}</span> <button class="add-btn" onclick="addSub(${tIdx})">+ SUB</button></div>`;
            
            topic.subsections.forEach((sub, sIdx) => {
                let subDiv = document.createElement('div');
                subDiv.className = 'sub-section';
                subDiv.innerHTML = `<div class="sub-title"><span>${sub.name}</span> <button class="add-btn" onclick="addOption(${tIdx}, ${sIdx})">+ OPT</button></div>`;
                
                let grid = document.createElement('div');
                grid.className = 'grid';
                if (sub.options) {
                    sub.options.forEach(opt => {
                        grid.innerHTML += `<a href="${opt.url}" target="_blank" class="option-btn">${opt.name}</a>`;
                    });
                }
                subDiv.appendChild(grid);
                topicDiv.appendChild(subDiv);
            });
            container.appendChild(topicDiv);
        });
    }

    function addTopic() {
        const name = prompt("Nome del nuovo Topic:");
        if(name) { data.topics.push({ name, subsections: [] }); render(); }
    }

    function addSub(tIdx) {
        const name = prompt("Nome della Sub-section:");
        if(name) { data.topics[tIdx].subsections.push({ name, options: [] }); render(); }
    }

    function addOption(tIdx, sIdx) {
        const name = prompt("Nome Opzione:");
        const url = prompt("URL o nome file:");
        if(name && url) { data.topics[tIdx].subsections[sIdx].options.push({ name, url }); render(); }
    }

    function exportData() {
        const jsonData = JSON.stringify(data, null, 2);
        const area = document.createElement("textarea");
        area.value = jsonData;
        document.getElementById('main-container').prepend(area);
        alert("Copia il codice apparso e incollalo nella variabile 'data' su GitHub.");
    }

    render();
</script>
</body>
</html>
