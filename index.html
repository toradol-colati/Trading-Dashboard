<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U.G.T. Strategic Hub</title>
    <style>
        :root { --bg: #121212; --accent: #00ff41; --text: #e0e0e0; --card: rgba(255, 255, 255, 0.05); }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        
        #main-container { padding-bottom: 100px; }
        
        /* Accordion Style */
        .topic { margin-bottom: 10px; border: 1px solid #222; border-radius: 4px; overflow: hidden; }
        .topic-header { background: #1a1a1a; padding: 10px 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #222; }
        .topic-title { font-size: 1.1rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }
        .topic-content { display: none; padding: 15px; background: #151515; }
        .topic.active .topic-content { display: block; }
        .topic.active .topic-header { border-bottom: 2px solid var(--accent); }

        .sub-section { margin-bottom: 20px; border-left: 2px solid #333; padding-left: 15px; }
        .sub-title { font-size: 0.9rem; color: #888; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
        
        /* Buttons Style */
        .option-btn { background: var(--card); border: 1px solid #333; color: white; padding: 8px; text-decoration: none; border-radius: 4px; text-align: center; font-size: 0.8rem; transition: 0.2s; }
        .option-btn:hover { background: rgba(0, 255, 65, 0.1); border-color: var(--accent); }
        
        .add-btn { background: rgba(0, 255, 65, 0.1); color: var(--accent); border: 1px solid var(--accent); padding: 4px 8px; cursor: pointer; font-size: 0.65rem; border-radius: 3px; text-transform: uppercase; }
        .add-btn:hover { background: rgba(0, 255, 65, 0.2); }

        .controls { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; justify-content: center; z-index: 100; }
        textarea#exportArea { width: 95%; height: 120px; background: #000; color: var(--accent); border: 1px solid var(--accent); margin: 10px auto; display: block; font-family: monospace; font-size: 11px; }
    </style>
</head>
<body>

<div id="main-container">Caricamento Hub...</div>

<div class="controls">
    <button class="add-btn" onclick="addTopic()">+ NUOVO TOPIC</button>
    <button class="add-btn" style="border-color: #ff9800; color: #ff9800; background: rgba(255, 152, 0, 0.1);" onclick="exportData()">SALVA CONFIG</button>
</div>

<script>
    let data = {
        "topics": [
            {
                "name": "algo-trading 🤖",
                "subsections": [
                    { "name": "Dal web 🛜", "options": [] },
                    { "name": "My researches and papers 📝", "options": [] }
                ]
            },
            {
                "name": "e-cademics 📚",
                "subsections": [
                    { "name": "e-Courses 📺", "options": [] },
                    { "name": "Files&manuals 📕", "options": [] },
                    { "name": "My own reseaerches n shit 🗒️", "options": [] }
                ]
            },
            { "name": "pac savings 🐖", "subsections": [] },
            {
                "name": "news 🌎",
                "subsections": [
                    {
                        "name": "Crypto",
                        "options": [
                            { "name": "cryptopanic", "url": "https://cryptopanic.com/" },
                            { "name": "CoinTelegraph", "url": "https://it.cointelegraph.com/" },
                            { "name": "CoinMarketCap", "url": "https://coinmarketcap.com/" },
                            { "name": "CoinDesk", "url": "https://www.coindesk.com/it" },
                            { "name": "TheBlock", "url": "https://www.theblock.co/" }
                        ]
                    },
                    {
                        "name": "General",
                        "options": [
                            { "name": "Bloomberg", "url": "https://www.bloomberg.com/europe" },
                            { "name": "FinancialTimes", "url": "https://www.ft.com/" },
                            { "name": "Reuters", "url": "https://www.reuters.com/" },
                            { "name": "ilSole24ore", "url": "https://www.ilsole24ore.com/" }
                        ]
                    }
                ]
            },
            {
                "name": "chart analysis 📈",
                "subsections": [
                    {
                        "name": "Crypto 📲💹",
                        "options": [
                            { "name": "BTCEUR (tv)", "url": "https://it.tradingview.com/chart/R4T4rycM/?symbol=COINBASE%3ABTCEUR" },
                            { "name": "Glassnode", "url": "https://studio.glassnode.com/" },
                            { "name": "Messari", "url": "https://messari.io/" },
                            { "name": "DexScreener", "url": "https://dexscreener.com/" },
                            { "name": "DefiLlama", "url": "https://defillama.com/" },
                            { "name": "Dune", "url": "https://dune.com/home" },
                            { "name": "Arkham", "url": "https://intel.arkm.com/" }
                        ]
                    },
                    {
                        "name": "General 📊",
                        "options": [
                            { "name": "MacroMicro", "url": "https://en.macromicro.me/macro/us" },
                            { "name": "TradingEconomics", "url": "https://tradingeconomics.com/" },
                            { "name": "FRED", "url": "https://fred.stlouisfed.org/" },
                            { "name": "ForexFactory", "url": "https://www.forexfactory.com/" }
                        ]
                    }
                ]
            },
            {
                "name": "brokers 👔",
                "subsections": [
                    {
                        "name": "Active",
                        "options": [
                            { "name": "Robinhood", "url": "https://robinhood.com/eu/it/" },
                            { "name": "YngPlatform", "url": "https://youngplatform.com/" },
                            { "name": "IBKR", "url": "https://www.interactivebrokers.com/" }
                        ]
                    },
                    {
                        "name": "Non-active",
                        "options": [
                            { "name": "Coinbase", "url": "https://login.coinbase.com/signin" },
                            { "name": "Binance", "url": "https://www.binance.com/it" },
                            { "name": "YouHodler", "url": "https://www.youhodler.com/it" },
                            { "name": "TradeRepublic", "url": "https://traderepublic.com/it-it" }
                        ]
                    }
                ]
            }
        ]
    };

    function render() {
        const container = document.getElementById('main-container');
        container.innerHTML = '';
        data.topics.forEach((topic, tIdx) => {
            let topicDiv = document.createElement('div');
            topicDiv.className = 'topic';
            
            let header = `<div class="topic-header" onclick="this.parentElement.classList.toggle('active')">
                            <span class="topic-title">${topic.name}</span>
                            <button class="add-btn" onclick="event.stopPropagation(); addSub(${tIdx})">+ SUB</button>
                          </div>`;
            
            let content = `<div class="topic-content">`;
            topic.subsections.forEach((sub, sIdx) => {
                content += `<div class="sub-section">
                                <div class="sub-title"><span>${sub.name}</span> <button class="add-btn" onclick="addOption(${tIdx}, ${sIdx})">+ OPT</button></div>
                                <div class="grid">`;
                if (sub.options) {
                    sub.options.forEach(opt => {
                        content += `<a href="${opt.url}" target="_blank" class="option-btn">${opt.name}</a>`;
                    });
                }
                content += `</div></div>`;
            });
            content += `</div>`;
            
            topicDiv.innerHTML = header + content;
            container.appendChild(topicDiv);
        });
    }

    function addTopic() { const name = prompt("Nome Topic:"); if(name) { data.topics.push({ name, subsections: [] }); render(); } }
    function addSub(tIdx) { const name = prompt("Nome Sub-section:"); if(name) { data.topics[tIdx].subsections.push({ name, options: [] }); render(); } }
    function addOption(tIdx, sIdx) {
        const name = prompt("Nome Opzione:");
        const url = prompt("URL o nome file:");
        if(name && url) { data.topics[tIdx].subsections[sIdx].options.push({ name, url }); render(); }
    }
    function exportData() {
        const jsonData = JSON.stringify(data, null, 2);
        const oldArea = document.getElementById('exportArea');
        if(oldArea) oldArea.remove();
        const textArea = document.createElement("textarea");
        textArea.id = "exportArea";
        textArea.value = jsonData;
        document.getElementById('main-container').prepend(textArea);
        alert("JSON pronto in alto. Copia e sostituisci su GitHub.");
    }
    render();
</script>
</body>
</html>
